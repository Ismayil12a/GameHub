<!DOCTYPE html>
<html>
<head>
    <title>GameHub</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            color: white;
            text-align: center;
            overflow-x: hidden;
        }

        /* Background slider */
        body {
            animation: slideBg 15s infinite;
            background-size: cover;
            background-position: center;
        }

        @keyframes slideBg {
            0% { background-image: url('https://images.unsplash.com/photo-1542751371-adc38448a05e'); }
            33% { background-image: url('https://images.unsplash.com/photo-1511512578047-dfb367046420'); }
            66% { background-image: url('https://images.unsplash.com/photo-1493711662062-fa541adb3fc8'); }
            100% { background-image: url('https://images.unsplash.com/photo-1542751371-adc38448a05e'); }
        }

        .overlay {
            background-color: rgba(0,0,0,0.7);
            min-height: 100vh;
            padding-bottom: 50px;
        }

        header {
            padding: 20px;
            font-size: 28px;
            background: rgba(0,0,0,0.8);
        }

        .container {
            margin-top: 80px;
        }

        h1 {
            font-size: 40px;
        }

        p {
            font-size: 20px;
            color: #ccc;
        }

        button {
            background-color: #ff4757;
            border: none;
            padding: 15px 25px;
            font-size: 18px;
            color: white;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 15px;
        }

        button:hover {
            background-color: #ff6b81;
        }

        /* Game cards */
        .games {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 50px;
            flex-wrap: wrap;
        }

        .card {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 10px;
            width: 200px;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
            background: rgba(255,255,255,0.2);
        }

        .card img {
            width: 100%;
            border-radius: 10px;
        }

        a {
            display: inline-block;
            margin-top: 30px;
            color: #70a1ff;
            font-size: 18px;
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="overlay">

<header>🎮 GameHub</header>

<div class="container">
    <h1>Welcome to GameHub</h1>
    <p>Don’t just play… play like it’s your last life 🔥</p>

    <button onclick="alert('Redirecting to purchase...')">Start Purchase</button>
</div>

<!-- Game Store Section -->
<div class="games">
    <div class="card">
        <img src="https://images.unsplash.com/photo-1605902711622-cfb43c4437d1">
        <h3>Action Game</h3>
        <button>Buy Now</button>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1511512578047-dfb367046420">
        <h3>Racing Game</h3>
        <button>Buy Now</button>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1493711662062-fa541adb3fc8">
        <h3>Adventure Game</h3>
        <button>Buy Now</button>
    </div>
</div>

<a href="page2.html">Explore More →</a>

</div>

</body>
</html>
